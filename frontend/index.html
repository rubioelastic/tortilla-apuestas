    <script>
        // Configuración de la API
        const API_URL = '';

        // ═══════════════════════════════════════════════════════════════
        // AUTENTICACIÓN
        // ═══════════════════════════════════════════════════════════════

        class AuthService {
            constructor() {
                this.token = localStorage.getItem('token');
                this.user = null;
            }

            isAuthenticated() {
                return !!this.token && !!this.user;
            }

            async loadUser() {
                if (!this.token) return;
                
                const response = await fetch(`${API_URL}/api/users/me`, {
                    headers: { 'Authorization': `Bearer ${this.token}` }
                });
                
                if (response.ok) {
                    this.user = await response.json();
                } else {
                    this.logout();
                }
            }

            async register(username, email, password, displayName, phone = null) {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, display_name: displayName, phone })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }

                const data = await response.json();
                this.token = data.access_token;
                this.user = data.user;
                localStorage.setItem('token', this.token);
            }

            async login(username, password) {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }

                const data = await response.json();
                this.token = data.access_token;
                this.user = data.user;
                localStorage.setItem('token', this.token);
            }

            logout() {
                this.token = null;
                this.user = null;
                localStorage.removeItem('token');
            }
        }

        // ═══════════════════════════════════════════════════════════════
        // GESTIÓN DE APUESTAS
        // ═══════════════════════════════════════════════════════════════

        class BetService {
            constructor(authService) {
                this.auth = authService;
            }

            async getBets(status = null) {
                let url = `${API_URL}/api/bets`;
                if (status) url += `?status=${status}`;
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${this.auth.token}` }
                });
                if (!response.ok) throw new Error('Error obteniendo apuestas');
                return await response.json();
            }

            async getBet(betId) {
                const response = await fetch(`${API_URL}/api/bets/${betId}`, {
                    headers: { 'Authorization': `Bearer ${this.auth.token}` }
                });
                if (!response.ok) throw new Error('Error obteniendo apuesta');
                return await response.json();
            }

            async createBet(title, description, options = [], invitedUserIds = []) {
                const response = await fetch(`${API_URL}/api/bets`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify({ 
                        title, 
                        description: description || null,
                        options: options.length > 0 ? options : null,
                        invited_user_ids: invitedUserIds.length > 0 ? invitedUserIds : null
                    })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async joinBet(betId, chosenOption = null) {
                const response = await fetch(`${API_URL}/api/bets/${betId}/join`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify({ chosen_option: chosenOption })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async finalizeBet(betId, winningOption, notes = null, tortillasCount = 1) {
                const response = await fetch(`${API_URL}/api/bets/${betId}/finalize`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify({ 
                        winning_option: winningOption,
                        notes,
                        tortillas_count: tortillasCount
                    })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async markBetAsPaid(betId, photoBase64 = null) {
                const body = {};
                if (photoBase64) {
                    body.payment_photo = photoBase64;
                }
                const response = await fetch(`${API_URL}/api/bets/${betId}/mark-paid`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${this.auth.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async updateBet(betId, updateData) {
                const response = await fetch(`${API_URL}/api/bets/${betId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify(updateData)
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async getRanking() {
                const response = await fetch(`${API_URL}/api/ranking`, {
                    headers: { 'Authorization': `Bearer ${this.auth.token}` }
                });
                if (!response.ok) throw new Error('Error obteniendo ranking');
                return await response.json();
            }

            async getGlobalStats() {
                const response = await fetch(`${API_URL}/api/stats/global`, {
                    headers: { 'Authorization': `Bearer ${this.auth.token}` }
                });
                if (!response.ok) throw new Error('Error obteniendo estadísticas');
                return await response.json();
            }

            async getUsers() {
                const response = await fetch(`${API_URL}/api/users`, {
                    headers: { 'Authorization': `Bearer ${this.auth.token}` }
                });
                if (!response.ok) throw new Error('Error obteniendo usuarios');
                return await response.json();
            }

            async inviteUsers(betId, userIds) {
                const response = await fetch(`${API_URL}/api/bets/${betId}/invite`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify({ user_ids: userIds })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async chooseOption(betId, chosenOption) {
                const response = await fetch(`${API_URL}/api/bets/${betId}/choose-option`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify({ chosen_option: chosenOption })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async closeBet(betId) {
                const response = await fetch(`${API_URL}/api/bets/${betId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify({ status: 'closed' })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }

            async reopenBet(betId) {
                const response = await fetch(`${API_URL}/api/bets/${betId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${this.auth.token}`
                    },
                    body: JSON.stringify({ status: 'open' })
                });
                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }
                return await response.json();
            }
        }

        function toggleAuthMode() {
            const registerFields = document.getElementById('registerFields');
            const mainBtn = document.getElementById('mainActionBtn');
            const toggleBtn = document.getElementById('toggleModeBtn');
            
            const isRegisterMode = registerFields.style.display === 'none';
            
            if (isRegisterMode) {
                // Cambiar a modo registro
                registerFields.style.display = 'block';
                mainBtn.textContent = 'Registrarse';
                mainBtn.className = 'w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 rounded-lg';
                mainBtn.onclick = handleRegister;
                toggleBtn.textContent = '¿Ya tienes cuenta? Inicia sesión';
            } else {
                // Cambiar a modo login
                registerFields.style.display = 'none';
                mainBtn.textContent = 'Iniciar Sesión';
                mainBtn.className = 'w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded-lg';
                mainBtn.onclick = handleLogin;
                toggleBtn.textContent = '¿No tienes cuenta? Regístrate';
            }
        }

        // Actualizar selectores de opciones cuando cambien las opciones de la apuesta
        function updateOptionSelectors() {
            const optionsText = document.getElementById('betOptions').value.trim();
            const options = optionsText ? optionsText.split('\n').map(opt => opt.trim()).filter(opt => opt.length > 0) : [];
            
            // Actualizar todos los selectores
            document.querySelectorAll('[name^="userOption-"]').forEach(select => {
                const currentValue = select.value;
                
                if (options.length === 0) {
                    select.innerHTML = '<option value="">⚠️ Primero define las opciones arriba</option>';
                } else {
                    select.innerHTML = '<option value="">Selecciona una opción...</option>' + 
                        options.map(opt => `<option value="${opt}">${opt}</option>`).join('');
                    // Restaurar valor si aún existe
                    if (options.includes(currentValue)) {
                        select.value = currentValue;
                    }
                }
            });
            
            // Actualizar estado del botón y advertencias
            updateCreateBetButtonState();
        }
        
        // Actualizar estado del botón de crear apuesta según validación
        function updateCreateBetButtonState() {
            const optionsText = document.getElementById('betOptions').value.trim();
            const options = optionsText ? optionsText.split('\n').map(opt => opt.trim()).filter(opt => opt.length > 0) : [];
            const checkedUsers = document.querySelectorAll('input[name="inviteUser"]:checked');
            
            const warning = document.getElementById('validationWarning');
            const message = document.getElementById('validationMessage');
            const button = document.getElementById('createBetButton');
            const buttonText = document.getElementById('createBetButtonText');
            
            // Si hay opciones definidas y usuarios invitados
            if (options.length > 0 && checkedUsers.length > 0) {
                let usersWithoutOption = 0;
                checkedUsers.forEach(checkbox => {
                    const userId = checkbox.value;
                    const select = document.getElementById(`option-${userId}`);
                    if (!select || !select.value) {
                        usersWithoutOption++;
                    }
                });
                
                if (usersWithoutOption > 0) {
                    warning.classList.remove('hidden');
                    message.textContent = `⚠️ ${usersWithoutOption} usuario(s) sin opción asignada. Ellos tendrán que elegir después.`;
                    buttonText.textContent = `Crear Apuesta (${checkedUsers.length - usersWithoutOption}/${checkedUsers.length} asignados)`;
                } else {
                    warning.classList.add('hidden');
                    buttonText.textContent = `Crear Apuesta ✓ (Todas asignadas)`;
                }
            } else {
                warning.classList.add('hidden');
                buttonText.textContent = 'Crear Apuesta';
            }
        }
        
        // Mostrar/ocultar selector de opción al marcar checkbox
        function toggleUserOptionSelector(userId) {
            const checkbox = document.querySelector(`input[name="inviteUser"][value="${userId}"]`);
            const select = document.getElementById(`option-${userId}`);
            const container = checkbox?.closest('.border-2');
            
            if (checkbox && select) {

                    select.classList.remove('hidden');

                    // Resaltar visualmente que está seleccionado
                    container?.classList.add('bg-green-50', 'border-green-400');

        async function handleCreateBet(event) {
            event.preventDefault();

            try {
                const title = document.getElementById('betTitle').value;
                const description = document.getElementById('betDescription').value;
                
                // Recoger opciones
                const optionsText = document.getElementById('betOptions').value.trim();
                const options = optionsText ? optionsText.split('\n').map(opt => opt.trim()).filter(opt => opt.length > 0) : [];

                // Recoger usuarios invitados y sus opciones
                const invitedUserIds = [];
                const participantChoices = {};
                const usersWithoutOption = [];
                
                document.querySelectorAll('input[name="inviteUser"]:checked').forEach(checkbox => {
                    const userId = parseInt(checkbox.value);
                    invitedUserIds.push(userId);
                    
                    // Obtener la opción seleccionada para este usuario
                    const optionSelect = document.getElementById(`option-${userId}`);
                    if (optionSelect && optionSelect.value) {
                        participantChoices[userId] = optionSelect.value;
                    } else {
                        // Obtener el nombre del usuario para el mensaje
                        const userLabel = checkbox.parentElement.querySelector('span.font-bold');
                        if (userLabel) usersWithoutOption.push(userLabel.textContent);
                    }
                });

                // Validación mejorada: explicar claramente las consecuencias
                if (usersWithoutOption.length > 0 && options.length > 0) {
                    const confirmMsg = `⚠️ ATENCIÓN: ${usersWithoutOption.length} usuario(s) sin opción asignada:\n\n${usersWithoutOption.join(', ')}\n\n━━━━━━━━━━━━━━━━━━━━━━━━━\n\n📋 OPCIONES:\n\n✅ CONTINUAR → Estos usuarios DEBERÁN elegir su opción después (recibirán notificación)\n\n❌ CANCELAR → Volver al formulario para asignar opciones tú mismo/a\n\n━━━━━━━━━━━━━━━━━━━━━━━━━\n\n💡 RECOMENDACIÓN: Si ya sabes qué apuesta cada uno, mejor asignar ahora.\n\n¿Continuar de todos modos?`;
                    if (!confirm(confirmMsg)) {
                        return; // Cancelar el envío
                    }
                }

                // Crear apuesta con opciones asignadas
                const betData = {
                    title,
                    description: description || null,
                    options: options.length > 0 ? options : null,
                    invited_user_ids: invitedUserIds.length > 0 ? invitedUserIds : null,
                    participant_choices: Object.keys(participantChoices).length > 0 ? participantChoices : null
                };
                
                const response = await fetch(`${API_URL}/api/bets`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${auth.token}`
                    },
                    body: JSON.stringify(betData)
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw error; // Lanzar el objeto completo, no wrapearlo en Error
                }
                
                const newBet = await response.json();
                
                // Limpiar formulario
                document.getElementById('betTitle').value = '';
                document.getElementById('betDescription').value = '';
                document.getElementById('betOptions').value = '';
                // Desmarcar checkboxes y ocultar selectores
                document.querySelectorAll('input[name="inviteUser"]:checked').forEach(cb => {
                    cb.checked = false;
                    toggleUserOptionSelector(parseInt(cb.value)); // Usar la función para limpiar correctamente
                });
                
                notifyNewBet(newBet);
                
                // Mensaje de éxito con detalles
                let successMsg = '✅ Apuesta creada exitosamente';
                if (Object.keys(participantChoices).length > 0) {
                    successMsg += `\n\n📌 Opciones asignadas por ti a ${Object.keys(participantChoices).length} participante(s)`;
                }
                alert(successMsg);
                
                // Cambiar a tab de activas y recargar
                switchTab('activas');
                loadActiveBets();
                loadStats();
            } catch (error) {
                console.error('Error creando apuesta:', error);
                alert('❌ Error: ' + getErrorMessage(error));
            }
        }

        function filterBetsByHallCategory(allBets, category, data) {
            const userId = data ? data.user_id : null;
            
            switch(category) {
                case 'king':
                    return allBets.filter(bet => {
                        if (bet.status !== 'completed' && bet.status !== 'paid') return false;
                        const participant = bet.participants.find(p => p.user_id === userId);
                        return participant && participant.chosen_option === bet.winning_option;
                    });
                case 'winning_streak':
                    const winningBets = [];
                    const sortedBets = allBets.filter(bet => (bet.status === 'completed' || bet.status === 'paid') && bet.winning_option).sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at));
                    for (const bet of sortedBets) {
                        const participant = bet.participants.find(p => p.user_id === userId);
                        if (participant && participant.chosen_option === bet.winning_option) {
                            winningBets.push(bet);
                        } else if (participant) break;
                    }
                    return winningBets;
                case 'compulsive':
                    return allBets.filter(bet => bet.participants.some(p => p.user_id === userId));
                case 'generous':
                    return allBets.filter(bet => {
                        if (bet.status !== 'paid') return false;
                        const participant = bet.participants.find(p => p.user_id === userId);
                        return participant && participant.chosen_option && participant.chosen_option !== bet.winning_option;
                    });
                case 'worst_payer':
                    return allBets.filter(bet => {
                        if (bet.status !== 'completed') return false;
                        const participant = bet.participants.find(p => p.user_id === userId);
                        return participant && participant.chosen_option && participant.chosen_option !== bet.winning_option;
                    });
                case 'losing_streak':
                    const losingBets = [];
                    const sortedLosses = allBets.filter(bet => (bet.status === 'completed' || bet.status === 'paid') && bet.winning_option).sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at));
                    for (const bet of sortedLosses) {
                        const participant = bet.participants.find(p => p.user_id === userId);
                        if (participant && participant.chosen_option && participant.chosen_option !== bet.winning_option) {
                            losingBets.push(bet);
                        } else if (participant && participant.chosen_option) break;
                    }
                    return losingBets;
                case 'ranking_user':
                    // Filtrar apuestas ganadas por un usuario específico
                    return allBets.filter(bet => {
                        if (bet.status !== 'completed' && bet.status !== 'paid') return false;
                        const participant = bet.participants.find(p => p.user_id === userId);
                        return participant && participant.chosen_option === bet.winning_option;
                    });
                case 'stat_all':
                    // Mostrar todas las apuestas
                    return allBets;
                case 'stat_active':
                    // Mostrar apuestas abiertas y cerradas
                    return allBets.filter(bet => bet.status === 'open' || bet.status === 'closed');
                case 'stat_completed':
                    // Mostrar apuestas completadas
                    return allBets.filter(bet => bet.status === 'completed');
                case 'stat_paid':
                    // Mostrar apuestas pagadas
                    return allBets.filter(bet => bet.status === 'paid');
                case 'stat_owed':
                    // Mostrar apuestas completadas no pagadas (deudas pendientes)
                    return allBets.filter(bet => bet.status === 'completed');
                default:
                    return allBets;
            }
        }

        async function applyHallFilter(categoryType) {
            if (!hallOfFameData) return;
            
            let data, categoryName;
            
            switch(categoryType) {
                case 'king':
                    data = hallOfFameData.king_of_tortillas;
                    categoryName = '👑 Rey de las Tortillas';
                    break;
                case 'winning_streak':
                    data = hallOfFameData.winning_streak;
                    categoryName = '🔥 Racha Ganadora';
                    break;
                case 'compulsive':
                    data = hallOfFameData.compulsive_better;
                    categoryName = '🎰 Apostador Compulsivo';
                    break;
                case 'generous':
                    data = hallOfFameData.generous_one;
                    categoryName = '⚡ El Generoso';
                    break;
                case 'worst_payer':
                    data = hallOfFameData.worst_payer;
                    categoryName = '💸 Peor Pagador';
                    break;
                case 'losing_streak':
                    data = hallOfFameData.losing_streak;
                    categoryName = '💀 Racha Perdedora';
                    break;
                default:
                    return;
            }
            
            if (!data) return;
            
            activeHallFilter = { category: categoryType, data, categoryName };
            switchTab('activas');
            await loadActiveBets();
        }

        async function loadActiveBets() {
            try {
                let betsList;
                
                // Si hay filtro activo, cargar todas las apuestas para filtrar
                if (activeHallFilter) {
                    const openBets = await bets.getBets('open');
                    const closedBets = await bets.getBets('closed');
                    const completedBets = await bets.getBets('completed');
                    const paidBets = await bets.getBets('paid');
                    const allBets = [...openBets, ...closedBets, ...completedBets, ...paidBets];
                    betsList = filterBetsByHallCategory(allBets, activeHallFilter.category, activeHallFilter.data);
                } else {
                    // Sin filtro: mostrar apuestas en curso (open + closed) y pendientes de pago (completed)
                    const openBets = await bets.getBets('open');
                    const closedBets = await bets.getBets('closed');
                    const completedBets = await bets.getBets('completed');
                    betsList = [...openBets, ...closedBets, ...completedBets];

                const container = document.getElementById('betsContainer');

                // Mostrar indicador de filtro activo

                    <div class="mb-4 p-3 bg-blue-50 border-l-4 border-blue-500 rounded flex justify-between items-center">
                        <div>
                            <span class="font-bold text-blue-700">🔍 Filtrando:</span>
                            <span class="text-sm text-blue-600">${activeHallFilter.categoryName} - ${activeHallFilter.data.display_name}</span>

        // Función auxiliar para extraer mensaje de error
        function getErrorMessage(error) {
            if (typeof error === 'string') return error;
            if (error?.message) return error.message;
            
            // Manejar errores de validación de FastAPI/Pydantic
            if (error?.detail) {
                // Si detail es un array (errores de validación)
                if (Array.isArray(error.detail)) {
                    const messages = error.detail.map(err => {
                        const field = err.loc ? err.loc.join('.') : 'campo';
                        return `${field}: ${err.msg}`;
                    }).join('\n');
                    return messages || 'Error de validación';
                }
                // Si detail es un string
                if (typeof error.detail === 'string') {
                    return error.detail;
                }
            }
            
            if (typeof error === 'object') {
                try {
                    return JSON.stringify(error);
                } catch {
                    return 'Error desconocido';
                }
            }
            return 'Error desconocido';
        }

        // Función auxiliar para mostrar notificaciones toast (en lugar de alert)
        function showToast(message, type = 'info') {
            // Detectar si es móvil
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                // En móvil: usar un toast temporal en lugar de alert
                const toast = document.createElement('div');
                toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg z-50 max-w-sm text-center ${
                    type === 'error' ? 'bg-red-500' : 
                    type === 'success' ? 'bg-green-500' : 
                    'bg-blue-500'
                } text-white font-medium`;
                toast.style.whiteSpace = 'pre-line';
                toast.textContent = message;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.transition = 'opacity 0.3s';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, type === 'info' ? 2000 : 4000);
            } else {
                // En desktop: usar alert tradicional
                alert(message);
            }
        }

        // TEMPORAL: Función para cambiar foto de apuesta (se ocultará después)
        async function handleBetPhotoChange(betId, input) {
            if (!input.files || !input.files[0]) {
                return;
            }

            const file = input.files[0];
            
            // Validar que sea una imagen
            if (!file.type.startsWith('image/')) {
                alert('❌ Por favor selecciona un archivo de imagen válido');
                return;
            }

            // Validar tamaño (máx 5MB)
            if (file.size > 5 * 1024 * 1024) {
                alert('❌ La imagen es muy grande. Máximo 5MB');
                return;
            }

            try {
                showToast('📤 Subiendo imagen...', 'info');

                // Convertir imagen a base64
                const base64 = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                // Actualizar la apuesta con la nueva foto
                const response = await fetch(`${API_URL}/api/bets/${betId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${auth.token}`
                    },
                    body: JSON.stringify({
                        payment_photo: base64
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }

                showToast('✅ Foto actualizada correctamente', 'success');
                
                // Recargar historial para mostrar la nueva imagen
                await loadHistorial();
                
                // Limpiar el input
                input.value = '';

            } catch (error) {
                console.error('Error actualizando foto:', error);
                showToast('❌ Error: ' + getErrorMessage(error), 'error');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('cameraPreview');
            const canvas = document.getElementById('photoCanvas');
            const capturedImg = document.getElementById('capturedPhoto');
            const captureButtons = document.getElementById('captureButtons');
            const confirmButtons = document.getElementById('confirmButtons');
            
            // Configurar canvas con las dimensiones del video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Capturar frame actual del video
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convertir a base64 (JPEG con calidad 0.8 para reducir tamaño)
            currentCapturedPhotoBase64 = canvas.toDataURL('image/jpeg', 0.8);
            
            // Mostrar la foto capturada
            capturedImg.src = currentCapturedPhotoBase64;
            capturedImg.classList.remove('hidden');
            video.classList.add('hidden');
            
            // Cambiar botones
            captureButtons.classList.add('hidden');
            confirmButtons.classList.remove('hidden');
        }

        async function handleInviteUsers(betId) {
            try {
                // Cargar apuesta para ver participantes actuales
                const bet = await bets.getBet(betId);
                const currentParticipantIds = bet.participants.map(p => p.user_id);
                
                // Cargar todos los usuarios
                await loadUsersSelector();
                
                // Filtrar usuarios que no están en la apuesta y que no son el usuario actual
                const availableUsers = allUsers.filter(u => 
                    !currentParticipantIds.includes(u.id) && u.id !== auth.user.id
                );
                
                if (availableUsers.length === 0) {
                    alert('ℹ️ No hay usuarios disponibles para invitar.\nTodos los usuarios ya participan en esta apuesta.');
                    return;
                }
                
                // Crear mensaje con lista de usuarios
                let message = `Usuarios disponibles para invitar:\n\n`;
                availableUsers.forEach((u, i) => {
                    message += `${i + 1}. ${u.display_name} (@${u.username})\n`;
                });
                message += '\nIntroduce los números separados por comas (ej: 1,3,5):';
                
                const selection = prompt(message);
                if (!selection || selection.trim() === '') {
                    return;
                }
                
                // Procesar selección
                const selectedIndices = selection.split(',')
                    .map(s => parseInt(s.trim()) - 1)
                    .filter(i => i >= 0 && i < availableUsers.length);
                
                if (selectedIndices.length === 0) {
                    alert('❌ Selección inválida');
                    return;
                }
                
                const userIds = selectedIndices.map(i => availableUsers[i].id);
                
                // Invitar usuarios
                const result = await bets.inviteUsers(betId, userIds);
                
                let successMsg = `✅ ${result.invited} usuario(s) invitado(s)!`;
                if (result.already_in.length > 0) {
                    successMsg += `\n⚠️ Ya participaban: ${result.already_in.join(', ')}`;
                }
                if (result.not_found.length > 0) {
                    successMsg += `\n❌ No encontrados (IDs): ${result.not_found.join(', ')}`;
                }
                
                alert(successMsg);
                loadActiveBets();
                
            } catch (error) {
                alert('❌ Error: ' + getErrorMessage(error));
            }
        }

        async function handleJoinBet(betId) {
            try {
                // Obtener detalles de la apuesta para ver las opciones
                const bet = await bets.getBet(betId);
                
                if (!bet.options || bet.options.length === 0) {
                    // Si no hay opciones, unirse sin elegir
                    await bets.joinBet(betId);
                    alert('✅ ¡Te uniste a la apuesta!');
                    loadActiveBets();
                    return;
                }
                
                // Mostrar opciones
                let message = `¿Qué opción eliges?\n\n`;
                bet.options.forEach((opt, i) => {
                    message += `${i + 1}. ${opt}\n`;
                });
                
                const choice = prompt(message + '\nIntroduce el número de tu opción:');
                
                if (!choice || choice < 1 || choice > bet.options.length) {
                    alert('❌ Debes elegir una opción válida');
                    return;
                }
                
                const selectedOption = bet.options[parseInt(choice) - 1];
                
                await bets.joinBet(betId, selectedOption);
                
                alert(`✅ ¡Te uniste a la apuesta!\n🎯 Elegiste: ${selectedOption}`);
                loadActiveBets();
            } catch (error) {
                alert('❌ Error: ' + getErrorMessage(error));
            }
        }

        function updateEditBetButtonState() {
            const warning = document.getElementById('editValidationWarning');
            const message = document.getElementById('editValidationMessage');
            const buttonText = document.getElementById('updateBetButtonText');
            
            // Contar cambios
            let changes = [];
            
            // Verificar participantes marcados para eliminar
            const toRemove = document.querySelectorAll('[id^="edit-participant-"].opacity-50').length;
            if (toRemove > 0) changes.push(`${toRemove} para eliminar`);
            
            // Verificar nuevos participantes
            const toAdd = document.querySelectorAll('input[name="editAddUser"]:checked').length;
            if (toAdd > 0) changes.push(`${toAdd} para añadir`);
            
            if (changes.length > 0) {
                warning.classList.remove('hidden');
                message.textContent = `Cambios pendientes: ${changes.join(', ')}`;
                buttonText.textContent = 'Guardar Cambios';
            } else {
                warning.classList.add('hidden');
                buttonText.textContent = 'Guardar Cambios';
            }
        }

        async function handleUpdateBet(event) {
            event.preventDefault();
            
            try {
                const betId = parseInt(document.getElementById('editBetId').value);
                const title = document.getElementById('editBetTitle').value.trim();
                const description = document.getElementById('editBetDescription').value.trim();
                const optionsText = document.getElementById('editBetOptions').value.trim();
                const options = optionsText ? optionsText.split('\n').map(opt => opt.trim()).filter(opt => opt.length > 0) : null;
                
                // Recoger participantes a eliminar
                const removeParticipants = [];
                document.querySelectorAll('[id^="edit-participant-"].opacity-50').forEach(el => {
                    const userId = parseInt(el.id.replace('edit-participant-', ''));
                    removeParticipants.push(userId);
                });
                
                // Recoger nuevos participantes y sus opciones
                const addParticipants = [];
                const participantChoices = {};
                
                // Opciones actualizadas de participantes existentes
                currentEditBetData.participants.forEach(p => {
                    if (!removeParticipants.includes(p.user_id)) {
                        const select = document.getElementById(`edit-option-${p.user_id}`);
                        if (select) {
                            const newOption = select.value;
                            if (newOption !== p.chosen_option) {
                                participantChoices[p.user_id] = newOption || null;
                            }
                        }
                    }
                });
                
                // Nuevos participantes
                document.querySelectorAll('input[name="editAddUser"]:checked').forEach(checkbox => {
                    const userId = parseInt(checkbox.value);
                    addParticipants.push(userId);
                    
                    const select = document.getElementById(`edit-add-option-${userId}`);
                    if (select && select.value) {
                        participantChoices[userId] = select.value;
                    }
                });
                
                // Construir objeto de actualización
                const updateData = {
                    title,
                    description: description || null,
                    options
                };
                
                if (removeParticipants.length > 0) {
                    updateData.remove_participants = removeParticipants;
                }
                
                if (addParticipants.length > 0) {
                    updateData.add_participants = addParticipants;
                }
                
                if (Object.keys(participantChoices).length > 0) {
                    updateData.participant_choices = participantChoices;
                }
                
                // Enviar actualización
                await bets.updateBet(betId, updateData);
                
                alert('✅ Apuesta actualizada correctamente');
                closeEditBetModal();
                loadActiveBets();
                
            } catch (error) {
                console.error('Error actualizando apuesta:', error);
                alert('❌ Error: ' + getErrorMessage(error));
            }
        }

        async function handleAddUser(event) {
            event.preventDefault();
            
            const username = document.getElementById('newUsername').value.trim();
            const displayName = document.getElementById('newDisplayName').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            const phone = document.getElementById('newPhone').value.trim();

            if (!username || !displayName || !email || !password) {
                alert('❌ Completa todos los campos obligatorios');

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, display_name: displayName, email, password, phone: phone || null })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }

                const result = await response.json();
                alert(`✅ Usuario ${displayName} creado exitosamente`);
                
                // Cerrar modal
                closeAddUserModal();
                
                // Recargar lista de usuarios
                await loadUsersSelector();
                
                // Seleccionar automáticamente el nuevo usuario
                const newUserCheckbox = document.querySelector(`input[name="inviteUser"][value="${result.user.id}"]`);
                if (newUserCheckbox) {
                    newUserCheckbox.checked = true;
                    toggleUserOptionSelector(result.user.id);
                }
            } catch (error) {
                alert('❌ ' + getErrorMessage(error));
            }
        }

        async function handleChangePassword(event) {

            const confirmPassword = document.getElementById('confirmPasswordInput').value;

            if (newPassword !== confirmPassword) {
                alert('❌ Las contraseñas no coinciden');
                return;

            if (newPassword === 'tortilla123') {
                alert('❌ No puedes usar la misma contraseña por defecto');

            if (newPassword.length < 6) {
                alert('❌ La contraseña debe tener al menos 6 caracteres');

            try {
                const response = await fetch(`${API_URL}/api/auth/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${auth.token}`
                    },
                    body: JSON.stringify({
                        current_password: 'tortilla123',
                        new_password: newPassword
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw error;
                }

                alert('✅ Contraseña cambiada exitosamente');
                
                // Cerrar modal y continuar con la aplicación
