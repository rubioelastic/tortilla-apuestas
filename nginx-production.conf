server {
    listen 80;
    server_name _;
    
    # Tamaño máximo de carga
    client_max_body_size 20M;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Servir archivos estáticos del frontend
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Proxy para el backend API
    location /api/ {
        proxy_pass http://tortilla-api:8000/api/;
        proxy_http_version 1.1;
        
        # Headers necesarios
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint directo
    location /api/health {
        proxy_pass http://tortilla-api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Documentación API
    location /api/docs {
        proxy_pass http://tortilla-api:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/redoc {
        proxy_pass http://tortilla-api:8000/redoc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # OpenAPI JSON
    location /api/openapi.json {
        proxy_pass http://tortilla-api:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
